name: Update VLESS Subscription

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}     # ← Important: ensures we are on the branch

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run subscription updater
        run: python update_subscription.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force Git to detect content changes properly
          git config core.fileMode false
          git config core.autocrlf input
          
          if git diff --quiet subscription.txt; then
            echo "ℹ️ No content changes detected (very rare now)"
          else
            git add subscription.txt
            git commit -m "Update subscription: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Subscription successfully updated and pushed!"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
