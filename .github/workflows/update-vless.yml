name: Update VLESS Subscription

on:
  schedule:
    - cron: '0 */3 * * *'     # Every 6 hours
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: write             # ← Critical: Give write permission

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Explicit token
          fetch-depth: 0                       # Needed for proper commit history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run subscription updater
        run: python update_subscription.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet subscription.txt; then
            echo "No changes detected in subscription.txt"
          else
            git add subscription.txt
            git commit -m "Update subscription: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Subscription updated and pushed successfully"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
